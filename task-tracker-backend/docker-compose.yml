services:
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - task_tracker_pgdata:/var/lib/postgresql/data

volumes:
  task_tracker_pgdata:
